<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayBread Watcher</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Leonie.css">
</head>
<body>

    <div class="app">

        <header>
            <h1>🍞 WayBread Watcher</h1>
        </header>

        <main>

            <!-- Willkommen -->
            <section class="card">
                <div class="big-icon">🔒</div>
                <h2>Willkommen, Gefährte!</h2>
                <p>Bitte authentifiziere dich, um auf den Proviantbeutel zuzugreifen.</p>
            </section>

            <!-- Fingerabdruck -->
            <section class="card">
                <i class="fa-solid fa-fingerprint big-icon"></i>
                <button>Fingerabdruck-Scan</button>
            </section>

            <!-- Status -->
            <div class="status">
                <span>🔒</span>
                <p>Status: Wartet auf Authentifizierung</p>
            </div>

            <!-- Hinweis -->
            <section class="card hinweis">
                <div class="big-icon">👥</div>
                <p><em>Hinweis:</em></p>
                <p>Neu hier? Registrierung nur durch einen autorisierten Gefährten möglich.</p>
            </section>

        </main>

    </div>

</body>
</html>
